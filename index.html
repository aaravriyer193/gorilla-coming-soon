<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1594181130407895"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
      /* The All-Blue Palette */
      --bg-dark: #020617; /* Very deep slate/navy */
      --blue-primary: #3b82f6;
      --blue-glow: #2563eb;
      --cyan-bright: #22d3ee;
      --blue-light: #bfdbfe;
      --glass: rgba(15, 23, 42, 0.4);
      --glass-border: rgba(59, 130, 246, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: #ffffff;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* --- DEEP BLUE BACKGROUND EFFECTS --- */
    .orb-1 {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, transparent 60%);
      filter: blur(90px);
      animation: drift 25s ease-in-out infinite alternate;
      z-index: 0;
    }

    .orb-2 {
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.1) 0%, transparent 60%);
      filter: blur(80px);
      animation: drift 20s ease-in-out infinite alternate-reverse;
      z-index: 0;
    }

    .orb-3 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
      filter: blur(60px);
      z-index: 0;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8%, 8%) scale(1.1); }
    }

    /* Subtle architectural grid */
    .cyber-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      z-index: 1;
    }

    /* --- CONTENT --- */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(34, 211, 238, 0.05);
      border: 1px solid rgba(34, 211, 238, 0.3);
      padding: 8px 16px;
      border-radius: 999px;
      color: var(--cyan-bright);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
    }

    .pulse {
      width: 8px;
      height: 8px;
      background-color: var(--cyan-bright);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--cyan-bright);
      animation: pulsate 1.5s infinite;
    }

    @keyframes pulsate {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.3); }
      100% { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 20px;
      background: linear-gradient(180deg, #ffffff 0%, var(--blue-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    p.subtitle {
      font-size: clamp(16px, 2.5vw, 22px);
      color: #94a3b8;
      max-width: 500px;
      line-height: 1.6;
      font-weight: 300;
    }

    /* Minimal loading bar */
    .loading-container {
      margin-top: 60px;
      width: 200px;
      height: 2px;
      background: rgba(59, 130, 246, 0.2);
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    .loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 30%;
      background: var(--cyan-bright);
      box-shadow: 0 0 10px var(--cyan-bright);
      animation: load 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      border-radius: 2px;
    }

    @keyframes load {
      0% { left: -30%; width: 30%; }
      50% { width: 40%; }
      100% { left: 100%; width: 30%; }
    }
  </style>
</head>
<body>

  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="orb-3"></div>
  <div class="cyber-grid"></div>

  <div class="content">
    <div class="status-badge">
      <div class="pulse"></div>
      Systems Initializing
    </div>
    
    <h1>Something amazing<br>is coming soon.</h1>
    
    <p class="subtitle">We are quietly building the next generation of infrastructure. Stand by.</p>

    <div class="loading-container">
      <div class="loading-bar"></div>
    </div>
  </div>

</body>
</html>
